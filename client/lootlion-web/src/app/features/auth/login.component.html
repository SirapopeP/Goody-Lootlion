<div class="shell">
  <div class="lang" aria-label="ภาษา (เร็วๆ นี้)">
    <span>EN</span><span class="sep">|</span><span>TH</span>
  </div>

  <div class="card">
    <div class="logo">
      <span class="logo-text">
        <span class="l">L</span><span class="rest">ootlion</span><span class="logo-leaf" aria-hidden="true">🌿</span>
      </span>
    </div>
    <p class="tagline">Mission to the moon</p>

    @if (errorMessage(); as err) {
      <p class="error" role="alert">{{ err }}</p>
    }

    <form class="form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label for="login-email">อีเมล</label>
        <input
          id="login-email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="you@example.com"
        />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <p class="field-error">กรุณากรอกอีเมลให้ถูกต้อง</p>
        }
      </div>

      <div class="field">
        <label for="login-password">รหัสผ่าน</label>
        <input
          id="login-password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <p class="field-error">กรุณากรอกรหัสผ่าน</p>
        }
      </div>

      <button class="btn-primary" type="submit" [disabled]="submitting()">
        {{ submitting() ? 'กำลังเข้าสู่ระบบ…' : 'เข้าสู่ระบบ' }}
      </button>

      <div class="divider" role="separator">หรือ</div>

      <a class="btn-secondary" routerLink="/auth/register">สมัครสมาชิก</a>
    </form>
  </div>
</div>
