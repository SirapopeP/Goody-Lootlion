<h1>เข้าสู่ระบบ</h1>
<p class="hint">ใช้บัญชีที่สมัครไว้ — ยังไม่มีบัญชี <a routerLink="/auth/register">สมัครสมาชิก</a></p>

@if (errorMessage(); as err) {
  <p class="error" role="alert">{{ err }}</p>
}

<form [formGroup]="form" (ngSubmit)="submit()">
  <label class="field">
    <span>อีเมล</span>
    <input type="email" formControlName="email" autocomplete="email" />
  </label>
  @if (form.controls.email.touched && form.controls.email.invalid) {
    <p class="field-error">กรุณากรอกอีเมลให้ถูกต้อง</p>
  }

  <label class="field">
    <span>รหัสผ่าน</span>
    <input type="password" formControlName="password" autocomplete="current-password" />
  </label>
  @if (form.controls.password.touched && form.controls.password.invalid) {
    <p class="field-error">กรุณากรอกรหัสผ่าน</p>
  }

  <button type="submit" tuiButton [disabled]="submitting()">
    {{ submitting() ? 'กำลังเข้าสู่ระบบ…' : 'เข้าสู่ระบบ' }}
  </button>
</form>
